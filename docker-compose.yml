services:
  backend:
    image: python:3.11
    volumes:
      - ./backend:/app
      - ./schema:/app/schema
      - ./tmp/backend.ini:/backend.ini
    working_dir: /app
    command: bash -c "pip install -r v1/requirements.txt && mkdir -p /static/img/ && uvicorn v1.server:app --host 0.0.0.0 --port 5000 --reload"
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://swag:swag@postgres:5432/swag
      GIT_COMMIT_INFO: 'Commit messages are not available locally'
      GIT_COMMIT_HASH: ''
      LOGINM_SEED: ${LOGINM_SEED}
      LOGINB_SEED: ${LOGINB_SEED}
      EVENT_API_TOKEN: ${EVENT_API_TOKEN}
      SECRET_KEY: ${SECRET_KEY:-SECRET_KEY}
      URL_MEMBER_API: 'https://medlem.mensa.se/mensa_verify/restlogin.php'
      URL_EXTERNAL_ROOT: 'https://swag.mensa.se/root.php'
      ENABLE_DEV_ENDPOINTS: 'true'
      MY_USER_ID: ${MY_USER_ID}
      TEST_MODE: 'true'
      APPLE_REVIEW_USER: apple@apple.com
      GOOGLE_REVIEW_USER: google@google.com
      REVIEW_PASSWORD: some-nice-password # Different in production
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://100.104.188.36:8043}

  # One-time Mongo → Postgres data migration.
  # Run with: docker compose --profile migrate up migrate
  # It exits 0 on success; re-running is safe (idempotent).
  migrate:
    image: python:3.11
    volumes:
      - ./backend:/app
    working_dir: /app
    command: >
      bash -c "pip install -r v1/requirements.txt pymongo --quiet &&
               python -m migrations.mongo_to_postgres"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017}
      DATABASE_URL: postgresql://swag:swag@postgres:5432/swag
    restart: "no"
    profiles:
      - migrate

  postgres:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: swag
      POSTGRES_PASSWORD: swag
      POSTGRES_DB: swag
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swag -d swag"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
