[alembic]
# script_location is relative to this file (backend/)
script_location = alembic

# Read DATABASE_URL from environment — never hardcode credentials here.
# Alembic will substitute %(DATABASE_URL)s from the environment if set,
# but env.py overrides sqlalchemy.url directly, so this acts as a
# documentation placeholder only.
sqlalchemy.url =

# Add backend/ to sys.path so `v1` package is importable
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
